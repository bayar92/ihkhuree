<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" preserveAspectRatio="xMidYMid slice" role="img" aria-label="City skyline">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a61ac"/>
      <stop offset="0.55" stop-color="#194278"/>
      <stop offset="1" stop-color="#112c4f"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="700" fill="url(#sky)"/>
  <circle cx="620" cy="150" r="70" fill="#ffffff" opacity="0.08"/>
  <rect width="800" height="320" y="0" fill="url(#haze)"/>

  <!-- back skyline -->
  <g fill="#163a68" opacity="0.85">
    <rect x="0" y="430" width="70" height="270"/>
    <rect x="80" y="380" width="60" height="320"/>
    <rect x="150" y="450" width="80" height="250"/>
    <rect x="560" y="400" width="70" height="300"/>
    <rect x="640" y="350" width="60" height="350"/>
    <rect x="710" y="430" width="90" height="270"/>
  </g>

  <!-- front skyline -->
  <g fill="#0b1d36">
    <rect x="40" y="500" width="90" height="200"/>
    <rect x="140" y="470" width="70" height="230"/>
    <rect x="220" y="360" width="80" height="340"/>
    <rect x="310" y="300" width="70" height="400"/>
    <rect x="390" y="410" width="90" height="290"/>
    <rect x="490" y="450" width="80" height="250"/>
    <rect x="580" y="380" width="70" height="320"/>
    <rect x="660" y="500" width="100" height="200"/>
  </g>

  <!-- windows -->
  <g fill="#7ba6db" opacity="0.55">
    <rect x="330" y="330" width="10" height="14"/>
    <rect x="350" y="330" width="10" height="14"/>
    <rect x="330" y="360" width="10" height="14"/>
    <rect x="350" y="360" width="10" height="14"/>
    <rect x="240" y="390" width="10" height="14"/>
    <rect x="260" y="390" width="10" height="14"/>
    <rect x="240" y="420" width="10" height="14"/>
    <rect x="600" y="410" width="10" height="14"/>
    <rect x="620" y="410" width="10" height="14"/>
    <rect x="600" y="440" width="10" height="14"/>
    <rect x="410" y="440" width="10" height="14"/>
    <rect x="430" y="440" width="10" height="14"/>
  </g>
</svg>
